[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.ruff]
target-version = "py311"
line-length = 110
extend-exclude = ["docs", "assets", ".venv"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # bugbear
    "SIM", # simplify
]
ignore = [
    "E501",  # line length — handled by formatter; many strings exceed it intentionally
    "B008",  # function call in default arg — common Strands pattern
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401", "F811"]

[tool.bandit]
exclude_dirs = ["tests", "docs", "assets"]
# B101: assert_used — fine in tests
# B310: urllib.urlopen — all URLs we open are hardcoded HTTPS or env-supplied (Ollama, Discord webhook, NBA stats)
skips = ["B101", "B310"]
